name: Build and Push to ECR and Deploy to ECS

on:
  pull_request:
    types: [closed]
    branches: [ main ]
jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/typelearner-frontend:latest .
          docker push $ECR_REGISTRY/typelearner-frontend:latest

      - name: Build and push Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/typelearner-repository-backend:latest ./server
          docker push $ECR_REGISTRY/typelearner-repository-backend:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service --cluster typelearner-cluster --service typelearner-service --force-new-deployment